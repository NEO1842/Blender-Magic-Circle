name: Bug Report
description: Report bugs or unexpected behavior
title: "[Bug] "
labels:
  - bug

body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the issue
      placeholder: Explain the problem here
    validations:
      required: true

  - type: input
    id: blender_version
    attributes:
      label: Blender Version
      placeholder: Blender 4.2
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Open project
        2. Play animation
        3. Problem appears
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: Describe what should happen
