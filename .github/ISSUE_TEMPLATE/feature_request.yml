name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels:
  - enhancement

body:
  - type: textarea
    id: feature
    attributes:
      label: Feature Description
      description: Describe the feature idea
      placeholder: Explain the feature...
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why Is It Useful?
      placeholder: Explain why this would improve the project
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional Information
      placeholder: Screenshots, references, ideas...
